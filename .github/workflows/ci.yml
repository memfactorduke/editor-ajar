# Editor Ajar — Continuous Integration (ADR-0011).
# Ordered quality gates: a change is merge-eligible only when these pass. Visual (golden-frame)
# gate is wired at ROADMAP M2. Performance benchmarks are report-only until a reference runner exists.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      # ADR-0005: the headless core must not depend on UI/GPU/AV frameworks. Enforced here so
      # architectural drift fails CI rather than rotting silently.
      - name: Enforce AjarCore dependency rule (ADR-0005)
        run: |
          if grep -REn "^[[:space:]]*import +(AppKit|SwiftUI|UIKit|Metal|MetalKit|MetalFX|AVFoundation|AVFAudio|CoreImage)" Sources/AjarCore; then
            echo "::error::AjarCore must not import UI/GPU/AV frameworks (ADR-0005)."
            exit 1
          fi
          echo "OK: AjarCore is free of UI/GPU/AV imports."

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      # AjarCommandTests runs the golden harness; placeholder title refs fail here and block the
      # dedicated golden-frame job (needs: build-test). Upload actuals so ADR-0017 reference
      # establishment still works when the gate is hit through the test suite.
      - name: Upload build-test golden actuals
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-test-golden-actuals
          path: |
            Tests/Fixtures/golden/**/_actual/**
            Tests/Fixtures/golden/**/_diff/**
          if-no-files-found: ignore

      - name: Upload crash reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crash-reports
          path: |
            ~/Library/Logs/DiagnosticReports/*.ips
            ~/Library/Logs/DiagnosticReports/*.crash
          if-no-files-found: ignore

  lint:
    name: Lint & format
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Ensure SwiftLint
        run: command -v swiftlint >/dev/null 2>&1 || brew install swiftlint

      - name: SwiftLint
        run: swiftlint --strict

      - name: swift-format (best effort until toolchain pinned)
        run: |
          if command -v swift-format >/dev/null 2>&1; then
            swift-format lint --recursive Sources Tests
          else
            echo "swift-format not found on runner; skipping (TODO: pin toolchain)."
          fi

  golden-frame:
    name: Golden-frame
    runs-on: macos-14
    needs: [build-test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Golden-frame gate (TESTING §2, ADR-0011)
        run: swift run ajar golden Tests/Fixtures/golden

      # On failure, upload harness actual/diff PNGs so new-fixture references can be
      # established from this macos-14 gate (ADR-0017 reference establishment).
      - name: Upload golden-frame actuals
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-frame-actuals
          path: |
            Tests/Fixtures/golden/**/_actual/**
            Tests/Fixtures/golden/**/_diff/**
          if-no-files-found: ignore

  golden-audio:
    name: Golden-audio
    runs-on: macos-14
    needs: [build-test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Golden-audio gate (TESTING §2, ADR-0011)
        run: swift run ajar golden-audio Tests/Fixtures/golden-audio

  ui-smoke:
    name: UI smoke (macOS app)
    runs-on: macos-14
    timeout-minutes: 10
    needs: [build-test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: XCTest app unit tests (EditorAjarTests)
        run: |
          rm -rf /tmp/editor-ajar-app-derived /tmp/editor-ajar-app-tests.xcresult
          xcodebuild test \
            -project app/EditorAjar/EditorAjar.xcodeproj \
            -scheme EditorAjar \
            -destination 'platform=macOS' \
            -derivedDataPath /tmp/editor-ajar-app-derived \
            -only-testing:EditorAjarTests \
            -test-timeouts-enabled YES \
            -default-test-execution-time-allowance 60 \
            -maximum-test-execution-time-allowance 120 \
            -resultBundlePath /tmp/editor-ajar-app-tests.xcresult

      # ROADMAP M2 exit: launch the app, find labeled controls, and exercise transport playback.
      - name: XCUITest smoke (ROADMAP M2, NFR-A11Y-001)
        shell: bash
        run: |
          set -o pipefail

          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            log_path="/tmp/editor-ajar-ui-smoke-${attempt}.log"
            result_bundle="/tmp/editor-ajar-ui-smoke-${attempt}.xcresult"
            rm -rf "$result_bundle" "$log_path"

            echo "::group::UI smoke attempt ${attempt}/${max_attempts}"
            set +e
            # #210: -only-testing overrides plan skippedTests; use -skip-testing for canvas
            # edit/nudge smokes. Guides toggle stays on.
            xcodebuild test \
              -project app/EditorAjar/EditorAjar.xcodeproj \
              -scheme EditorAjar \
              -testPlan EditorAjarCI \
              -destination 'platform=macOS' \
              -derivedDataPath /tmp/editor-ajar-app-derived \
              -only-testing:EditorAjarUITests \
              -skip-testing:EditorAjarUITests/EditorAjarUISmokeTests/testFRTXT003DragsAndKeyboardNudgesCanvasTitleBox \
              -skip-testing:EditorAjarUITests/EditorAjarUISmokeTests/testFRTXT003EditsCanvasTitleWithKeyboardAndUndoRestoresText \
              -test-timeouts-enabled YES \
              -default-test-execution-time-allowance 60 \
              -maximum-test-execution-time-allowance 120 \
              -resultBundlePath "$result_bundle" 2>&1 | tee "$log_path"
            status=${PIPESTATUS[0]}
            set -e
            echo "::endgroup::"

            if [ "$status" -eq 0 ]; then
              exit 0
            fi

            if ! grep -E -q \
              -e "Application 'org.editorajar.EditorAjar' does not have a process ID" \
              -e "Editor Ajar did not launch after" \
              -e "Early unexpected exit" \
              -e "operation never finished bootstrapping" \
              -e "Test crashed with signal kill before establishing connection" \
              "$log_path"; then
              echo "::error::UI smoke failed without a known launch/bootstrap flake; not retrying."
              exit "$status"
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "::error::UI smoke hit the launch/bootstrap retry limit."
              exit "$status"
            fi

            echo "::warning::UI smoke launch/bootstrap flake on attempt ${attempt}; retrying."
            sleep 5
          done

      - name: Upload UI smoke xcresults
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-xcresults
          path: |
            /tmp/editor-ajar-ui-smoke-*.xcresult
            /tmp/editor-ajar-app-tests.xcresult
          if-no-files-found: ignore

  soak:
    name: Soak (short, NFR-STAB-005)
    runs-on: macos-14
    # A stability gate must fail fast on a hang instead of riding the runner default.
    timeout-minutes: 10
    needs: [build-test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      # Short per-PR leak/allocations soak (TESTING §8): a seeded, deterministic edit+render
      # loop whose post-warmup memory footprint must stay inside the growth band. The full
      # 1-hour acceptance run (`ajar soak --duration-seconds 3600`) is executed before
      # releases, not per PR.
      - name: Short leak/allocations soak (NFR-STAB-005)
        run: swift run ajar soak --duration-seconds 150

  benchmarks-report:
    name: Benchmarks (report)
    runs-on: macos-14
    needs: [build-test, lint, golden-frame, golden-audio, ui-smoke]
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      # Hosted-runner output is report-only. Reference-machine regression gating is deferred until
      # the M1 Pro runner from docs/PERFORMANCE.md exists.
      - name: Benchmark report (NFR-PERF-001/002/005)
        run: scripts/bench.sh

  # ── Forthcoming gates (wired after ROADMAP M2, per docs/TESTING.md §5) ──────────────────────
  # sanitizers:
  #   `swift test --sanitize=thread` and `--sanitize=address` (NFR-STAB-004).
