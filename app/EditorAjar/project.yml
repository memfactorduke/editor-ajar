name: EditorAjar
options:
  bundleIdPrefix: org.editorajar
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
packages:
  EditorAjarPackage:
    path: ../..
settings:
  base:
    CLANG_ANALYZER_NONNULL: YES
    CLANG_ANALYZER_NUMBER_OBJECT_CONVERSION: YES_AGGRESSIVE
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: NO
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "5.9"
targets:
  EditorAjar:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: EditorAjarPackage
        product: AjarCore
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Editor Ajar
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.video
        PRODUCT_BUNDLE_IDENTIFIER: org.editorajar.EditorAjar
        PRODUCT_NAME: EditorAjar
  EditorAjarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: EditorAjar
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.editorajar.EditorAjarTests
schemes:
  EditorAjar:
    build:
      targets:
        EditorAjar: all
        EditorAjarTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - EditorAjarTests
