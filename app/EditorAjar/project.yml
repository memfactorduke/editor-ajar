name: EditorAjar
options:
  bundleIdPrefix: org.editorajar
  createIntermediateGroups: true
  projectFormat: xcode15_3
  deploymentTarget:
    macOS: "14.0"
packages:
  EditorAjarPackage:
    path: ../..
    group: editor-ajar
settings:
  base:
    CLANG_ANALYZER_NONNULL: YES
    CLANG_ANALYZER_NUMBER_OBJECT_CONVERSION: YES_AGGRESSIVE
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: NO
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "5.9"
targets:
  EditorAjar:
    type: application
    platform: macOS
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Editor Ajar
        LSMinimumSystemVersion: "14.0"
        LSApplicationCategoryType: public.app-category.video
        NSHighResolutionCapable: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: Editor Ajar Project
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSTypeIsPackage: true
            LSItemContentTypes:
              - org.editorajar.project
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: org.editorajar.project
            UTTypeDescription: Editor Ajar Project
            UTTypeConformsTo:
              - com.apple.package
            UTTypeTagSpecification:
              public.filename-extension:
                - ajar
    sources:
      - path: Sources
    dependencies:
      - package: EditorAjarPackage
        product: AjarCore
      - package: EditorAjarPackage
        product: AjarRender
      - package: EditorAjarPackage
        product: AjarMedia
      - package: EditorAjarPackage
        product: AjarAudio
      - package: EditorAjarPackage
        product: AjarExport
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: org.editorajar.EditorAjar
        PRODUCT_NAME: EditorAjar
  EditorAjarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: EditorAjar
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.editorajar.EditorAjarTests
  EditorAjarUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: UITests
    dependencies:
      - target: EditorAjar
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.editorajar.EditorAjarUITests
schemes:
  EditorAjar:
    build:
      targets:
        EditorAjar: all
        EditorAjarTests: [test]
        EditorAjarUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      # EditorAjarCI is default (skips canvas edit/nudge smokes — #210). Local includes all.
      testPlans:
        - path: EditorAjarCI.xctestplan
          defaultPlan: true
        - path: EditorAjarLocal.xctestplan
      targets:
        - EditorAjarTests
        - EditorAjarUITests
